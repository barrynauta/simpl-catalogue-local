services:
  postgres:
    image: postgres:15-alpine
    container_name: catalogue-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-catalogue}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-catalogue_local_pass}
      - POSTGRES_DB=${POSTGRES_DB:-fc_catalogue}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - catalogue-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-catalogue}"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.14.0
    container_name: catalogue-neo4j
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4j}
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,gds.*,n10s.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*,gds.*,n10s.*
      - NEO4J_server_memory_heap_initial__size=512M
      - NEO4J_server_memory_heap_max__size=1G
      - NEO4J_server_memory_pagecache_size=512M
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
      - neo4j-plugins:/plugins
    networks:
      - catalogue-net
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p catalogue_pass 'RETURN 1'"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s

  fc-service:
    build:
      context: .
      dockerfile: Dockerfile.fc-service
    image: catalogue-fc-service
    container_name: catalogue-fc-service
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-fc_catalogue}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-catalogue}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-catalogue_local_pass}
      - JAVA_TOOL_OPTIONS=-Dspring.profiles.active=local -Dspring.config.additional-location=file:/app/config/
      - FEDERATED_CATALOGUE_SCOPE=runtime
    ports:
      - "${FC_SERVICE_PORT:-8081}:8081"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - catalogue-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  xfsc-advsearch-be:
    build:
      context: .
      dockerfile: Dockerfile.xfsc-advsearch-be
    image: catalogue-xfsc-advsearch-be
    container_name: catalogue-advsearch
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - KEYCLOAK_RESOURCE=federated-catalogue
      - KEYCLOAK_ENABLED=false
      - FC_SERVICE_URL=http://fc-service:8081
    ports:
      - "${ADVSEARCH_PORT:-8080}:8080"
    depends_on:
      fc-service:
        condition: service_healthy
    networks:
      - catalogue-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  catalogue-client:
    build:
      context: .
      dockerfile: Dockerfile.catalogue-client
    image: catalogue-client
    container_name: catalogue-client
    environment:
      - PUBLIC_AUTH_KEYCLOAK_SERVER_URL=
      - PUBLIC_AUTH_KEYCLOAK_REALM=
      - PUBLIC_AUTH_KEYCLOAK_CLIENT_ID=
      - PUBLIC_SEARCH_API_URL=http://localhost:${ADVSEARCH_PORT:-8080}
      - PUBLIC_SEARCH_API_VERSION=v1
      - PUBLIC_CONTRACT_CONSUMPTION_API_URL=
      - PUBLIC_CONTRACT_CONSUMPTION_API_VERSION=v1
      - PUBLIC_AGENT_TYPE=consumer
      - USE_MOCK_APIS=true
      - HOST=0.0.0.0
      - PORT=4321
    ports:
      - "${CATALOGUE_UI_PORT:-4321}:4321"
    depends_on:
      - xfsc-advsearch-be
    networks:
      - catalogue-net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:4321/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  catalogue-net:
    driver: bridge

volumes:
  postgres-data:
  neo4j-data:
  neo4j-logs:
  neo4j-plugins:
